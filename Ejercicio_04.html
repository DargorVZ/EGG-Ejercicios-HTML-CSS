<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 04</title>
</head>

<body>
    <header>
        <h1>Papas Fritas</h1>
    </header>
    <main>
        <p>Receta de papas fritas caseras.</p>
        <img src="images/papas.png" alt="Imagen de Ricas Papas Fritas">

        <h2>Ingredientes</h2>

        <ul>
            <li>3 o 4 papas (300gr)</li>
            <li>Aceite</li>
            <li>Sal</li>
        </ul>

        <h2>Elaboración (Pasos)</h2>

        <ul>
            <li>Pelar las papas</li>
            <li>Cortarlas en baston</li>
            <li>Calentar aceite en una sarten</li>
            <li>Cocinar hasta que esten doradas</li>
            <li>Removerlas del aceite y salar a gusto</li>
        </ul>
        <hr>
    </main>
</body>

</html>
